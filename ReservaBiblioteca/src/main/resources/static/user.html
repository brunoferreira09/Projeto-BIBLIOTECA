<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuários</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
  <h1>Sistema de Biblioteca</h1>
  <img src="/img/Logo.png" alt="Logo">
</header>

<nav>
  <h2>Menu</h2>
  <ul>
    <li><a href="/liv.html">Cadastro de Livros</a></li>
    <li><a href="/dev.html">Devolver Empréstimo</a></li>
    <li><a href="/index.html">Voltar</a></li>
  </ul>
</nav>

<main>
  <!-- =========================
       USUÁRIOS
  ========================== -->
  <section id="usuarios" class="card">
    <h2>Cadastro de Usuários</h2>
    <input type="text" id="nomeUsuario" placeholder="Nome">
    <input type="text" id="matriculaUsuario" placeholder="Matrícula">
    <input type="text" id="contatoUsuario" placeholder="Contato">
    <button onclick="cadastrarUsuario()">Cadastrar Usuário</button>
    <hr>
    <h3>Usuários Cadastrados</h3>
    <button onclick="listarUsuarios()">Atualizar Lista</button>
    <ul id="listaUsuarios"></ul>
  </section>
</main>

<!-- Importa o JS único -->
<script src="/js/script.js"></script>
</body>
</html>
