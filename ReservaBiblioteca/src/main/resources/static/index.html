<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Biblioteca</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Sistema Biblioteca</h1>
    </header>

    <main>

        <!-- USUÁRIOS -->
        <section class="card">
            <h2>Cadastro de Usuário</h2>

            <input type="text" id="nomeUsuario" placeholder="Nome">
           <input type="text" id="matriculaUsuario" placeholder="Matrícula">

            <button onclick="cadastrarUsuario()">
                Cadastrar Usuário
            </button>

            <ul id="listaUsuarios"></ul>
        </section>

        <!-- LIVROS -->
        <section class="card">
            <h2>Cadastro de Livro</h2>

            <input type="text" id="tituloLivro" placeholder="Título">
            <input type="text" id="autorLivro" placeholder="Autor">
            <input type="text" id="isbnLivro" placeholder="ISBN">

            <button onclick="cadastrarLivro()">
                Cadastrar Livro
            </button>

            <ul id="listaLivros"></ul>
        </section>

        <!-- EMPRÉSTIMO -->
        <section class="card">
            <h2>Registrar Empréstimo</h2>

            <input type="number" id="usuarioId" placeholder="ID Usuário">
            <input type="number" id="livroId" placeholder="ID Livro">

            <button onclick="registrarEmprestimo()">
                Registrar
            </button>
        </section>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
