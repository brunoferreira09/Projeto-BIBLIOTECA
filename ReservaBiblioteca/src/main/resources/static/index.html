<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Biblioteca</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <h1>Sistema de Biblioteca</h1>
</header>

<main>

    <!-- =========================
         USUÁRIOS
    ========================== -->
    <section class="card">
        <h2>Cadastro de Usuários</h2>
        <input type="text" id="nomeUsuario" placeholder="Nome">
        <input type="text" id="matriculaUsuario" placeholder="Matrícula">
        <input type="text" id="contatoUsuario" placeholder="Contato">
        <button onclick="cadastrarUsuario()">Cadastrar Usuário</button>

        <h3>Usuários Cadastrados</h3>
        <ul id="listaUsuarios"></ul>
    </section>

    <!-- =========================
         LIVROS
    ========================== -->
    <section class="card">
        <h2>Cadastro de Livros</h2>
        <input type="text" id="tituloLivro" placeholder="Título">
        <input type="text" id="autorLivro" placeholder="Autor">
        <input type="text" id="isbnLivro" placeholder="ISBN">
        <input type="text" id="categoriaLivro" placeholder="Categoria">
        <input type="text" id="editoraLivro" placeholder="Editora">
        <input type="number" id="anoLivro" placeholder="Ano">
        <button onclick="cadastrarLivro()">Cadastrar Livro</button>

        <h3>Livros Cadastrados</h3>
        <ul id="listaLivros"></ul>
    </section>

    <!-- =========================
         EMPRÉSTIMOS
    ========================== -->
    <section class="card">
        <h2>Registrar Empréstimo</h2>
        <input type="number" id="usuarioId" placeholder="ID Usuário">
        <input type="number" id="livroId" placeholder="ID Livro">
        <button onclick="registrarEmprestimo()">Registrar Empréstimo</button>
    </section>

    <!-- =========================
         DEVOLVER EMPRÉSTIMO
    ========================== -->
    <section class="card">
        <h2>Devolver Empréstimo</h2>
        <input type="number" id="emprestimoId" placeholder="ID Empréstimo">
        <button onclick="devolverEmprestimo()">Devolver Empréstimo</button>
    </section>

    <!-- =========================
         LISTA DE EMPRÉSTIMOS
    ========================== -->
    <section class="card">
        <h2>Lista de Empréstimos</h2>
        <button onclick="listarEmprestimos()">Atualizar Lista</button>
        <ul id="listaEmprestimos"></ul>
    </section>

</main>

<script src="/js/script.js"></script>
</body>
</html>
